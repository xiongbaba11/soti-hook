name: Build SmartAnswer IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build
        run: |
          cd SmartAnswer
          xcodebuild -project SmartAnswer.xcodeproj -scheme SmartAnswer -sdk iphoneos -configuration Release \
            -archivePath $PWD/build/SmartAnswer.xcarchive archive \
            CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
            ENABLE_BITCODE=NO
          
          cd build/SmartAnswer.xcarchive/Products
          mkdir -p Payload
          mv Applications/SmartAnswer.app Payload/
          zip -r SmartAnswer.ipa Payload
          mv SmartAnswer.ipa ../../../
          cd ../../../
          ls -la SmartAnswer.ipa
      
      - uses: actions/upload-artifact@v4
        with:
          name: smartanswer-ipa
          path: SmartAnswer/SmartAnswer.ipa
